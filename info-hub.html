<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Info Hub | Student Verification</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #4a6fa5; --text: #f8fafc; --red: #ef4444; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .search-container { position: sticky; top: 0; background: var(--bg); padding: 10px 0; z-index: 100; }
        .search-bar { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: white; font-size: 18px; outline: none; border: 2px solid var(--primary); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 10px 15px rgba(0,0,0,0.2); }
        .student-img { width: 180px; height: 180px; border-radius: 15px; object-fit: cover; margin-bottom: 15px; border: 3px solid var(--primary); }
        .roll-id { font-size: 14px; color: var(--primary); font-weight: 800; background: rgba(74, 111, 165, 0.1); padding: 5px 15px; border-radius: 30px; display: inline-block; }
        .alert-box { background: var(--red); color: white; padding: 12px; border-radius: 10px; margin-top: 15px; font-weight: 900; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .btn-db { background: var(--primary); color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<script>if(sessionStorage.getItem("isLoggedIn") !== "true") { window.location.href = "index.html"; }</script>

<div class="nav">
    <h1>Prefect's Council</h1>
    <a href="database.html" class="btn-db">Manage Records</a>
</div>

<div class="search-container">
    <input type="text" id="search" class="search-bar" placeholder="Type Roll Number to Verify Student..." oninput="doSearch()">
</div>

<div class="grid" id="container">
    <p style="text-align:center; grid-column: 1/-1;">Loading Student Intelligence...</p>
</div>

<script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";
    const S_URL = "https://tececdtemfsqemgfkrbs.supabase.co";
    const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlY2VjZHRlbWZzcWVtZ2ZrcmJzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMzU4MzEsImV4cCI6MjA5MjYxMTgzMX0.D6igTj9UlTOi3ws-Pne6MaV9COyhsta-gJnC7mL_ksQ";
    const supabase = createClient(S_URL, S_KEY);

    let allStudents = [];

    async function fetchStudents() {
        const { data } = await supabase.from('student_records').select('*').order('name');
        allStudents = data || [];
        render(allStudents);
    }

    function render(list) {
        const div = document.getElementById('container');
        if(list.length === 0) { div.innerHTML = "<p>No matching students found.</p>"; return; }
        
        div.innerHTML = list.map(s => `
            <div class="card">
                <img src="${s.photo_url || 'https://via.placeholder.com/180?text=NO+PHOTO'}" class="student-img">
                <div style="font-size: 20px; font-weight: 800; margin-bottom: 5px;">${s.name}</div>
                <div class="roll-id">ROLL NO: ${s.roll_number}</div>
                <div style="margin-top:10px; color: #94a3b8;">House: ${s.house} | Stars: ${s.black_stars}</div>
                
                ${s.black_stars >= 5 ? `
                    <div class="alert-box">🚨 SEIZE LAPTOP IMMEDIATELY 🚨</div>
                ` : ''}
            </div>
        `).join('');
    }

    window.doSearch = () => {
        const q = document.getElementById('search').value.toLowerCase();
        const filtered = allStudents.filter(s => 
            s.roll_number.toString().includes(q) || 
            s.name.toLowerCase().includes(q)
        );
        render(filtered);
    };

    fetchStudents();
</script>
</body>
</html>
