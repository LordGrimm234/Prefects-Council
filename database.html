<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Database Manager | Winter House</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #4a6fa5; --text: #f8fafc; --border: rgba(255,255,255,0.1); }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .box { max-width: 900px; margin: auto; }
        .form { background: var(--card); padding: 20px; border-radius: 12px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 20px; border: 1px solid var(--border); }
        input { background: #0f172a; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; font-size: 14px; width: 100%; box-sizing: border-box; }
        #drop-zone { grid-column: span 2; border: 2px dashed var(--primary); padding: 20px; text-align: center; border-radius: 12px; cursor: pointer; color: #94a3b8; }
        .save-btn { grid-column: span 2; background: #10b981; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
        .del-btn { color: #ef4444; background: none; border: 1px solid #ef4444; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .loading-ring { font-size: 12px; color: var(--primary); grid-column: span 2; display: none; }
    </style>
</head>
<body>

<div class="box">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h1>📊 Data Register</h1>
        <a href="info-hub.html" style="color: var(--primary); text-decoration:none;">← Back to Hub</a>
    </div>

    <div class="form">
        <div style="grid-column: span 2;">
            <label style="font-size: 12px; color: #94a3b8;">Enter Roll Number first to update existing student:</label>
            <input type="number" id="r" placeholder="Enter Roll Number..." oninput="lookupStudent()">
        </div>
        
        <div id="lookup-status" class="loading-ring">Searching database...</div>

        <input type="text" id="n" placeholder="Full Name">
        <input type="text" id="h" placeholder="Day House">
        <input type="text" id="bh" placeholder="Boarding House">
        <input type="text" id="g" placeholder="Grade">
        <input type="number" id="s" placeholder="Black Stars" style="grid-column: span 2;">
        
        <div id="drop-zone">
            <span id="drop-text">Drag NEW Photo (Optional if updating)</span>
            <input type="file" id="fileInput" hidden accept="image/*">
        </div>

        <button class="save-btn" onclick="save()">Update / Save Student</button>
    </div>

    <table>
        <thead><tr><th>Name</th><th>Roll</th><th>Stars</th><th>Action</th></tr></thead>
        <tbody id="list"></tbody>
    </table>
</div>

<script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";
    const S_URL = "https://tececdtemfsqemgfkrbs.supabase.co";
    const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlY2VjZHRlbWZzcWVtZ2ZrcmJzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMzU4MzEsImV4cCI6MjA5MjYxMTgzMX0.D6igTj9UlTOi3ws-Pne6MaV9COyhsta-gJnC7mL_ksQ";
    const supabase = createClient(S_URL, S_KEY);

    let selectedFile = null;
    let existingPhotoUrl = "";

    // LOOKUP FUNCTION
    window.lookupStudent = async () => {
        const roll = document.getElementById('r').value;
        const status = document.getElementById('lookup-status');
        
        if (roll.length >= 2) {
            status.style.display = "block";
            const { data, error } = await supabase.from('student_records').select('*').eq('roll_number', roll).single();
            
            if (data) {
                document.getElementById('n').value = data.name;
                document.getElementById('h').value = data.house;
                document.getElementById('bh').value = data.boarding_house || "";
                document.getElementById('g').value = data.grade;
                document.getElementById('s').value = data.black_stars;
                existingPhotoUrl = data.photo_url;
                status.innerText = "✅ Student Found: Auto-filled data.";
            } else {
                status.innerText = "✨ New Student: Enter details below.";
            }
        }
    };

    // FILE LOGIC
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('drop-zone');
    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = () => { selectedFile = fileInput.files[0]; document.getElementById('drop-text').innerText = selectedFile.name; };

    // SAVE LOGIC
    window.save = async () => {
        const roll = document.getElementById('r').value;
        if(!roll) return alert("Roll Number required!");

        let finalPhotoUrl = existingPhotoUrl;

        if(selectedFile) {
            const fileName = `public/${roll}.png`;
            const { data: upData } = await supabase.storage.from('student-photos').upload(fileName, selectedFile, { upsert: true });
            const { data } = supabase.storage.from('student-photos').getPublicUrl(fileName);
            finalPhotoUrl = data.publicUrl;
        }

        const { error } = await supabase.from('student_records').upsert([{
            roll_number: roll,
            name: document.getElementById('n').value,
            house: document.getElementById('h').value,
            boarding_house: document.getElementById('bh').value,
            grade: document.getElementById('g').value,
            black_stars: parseInt(document.getElementById('s').value) || 0,
            photo_url: finalPhotoUrl
        }]);

        if(error) alert(error.message); else { alert("Database Updated!"); location.reload(); }
    };

    async function load() {
        const { data } = await supabase.from('student_records').select('*').order('name');
        document.getElementById('list').innerHTML = data.map(i => `<tr><td>${i.name}</td><td>${i.roll_number}</td><td>${i.black_stars}</td><td><button class="del-btn" onclick="del('${i.roll_number}')">Delete</button></td></tr>`).join('');
    }
    window.del = async (id) => { if(confirm("Delete?")) { await supabase.from('student_records').delete().eq('roll_number', id); load(); } };
    load();
</script>
</body>
</html>
